<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cafert Admin — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{
  --cream:#fbf8f3;--cream-2:#f3ede2;--coffee:#2d2218;--coffee-2:#3d2f27;
  --caramel:#d4a85a;--caramel-dk:#a8804a;--olive:#5d5a3a;
  --sweet-red:#c8553d;--sweet-red-dk:#9b3a26;--muted:#9e8d75;
  --line:rgba(212,168,90,.18);
  --grad-add:linear-gradient(135deg,#5b4636 0%,#3a2d22 60%,#2a1f17 100%);
  --grad-edit:linear-gradient(135deg,#d9b489 0%,#c8a37a 50%,#a8814f 100%);
  --grad-delete:linear-gradient(135deg,#e07b62 0%,#c8553d 55%,#8a2f1d 100%);
  --shadow-sm:0 2px 6px rgba(58,45,34,.08);
  --shadow-md:0 10px 24px -10px rgba(58,45,34,.35);
  --shadow-lg:0 18px 40px -14px rgba(58,45,34,.45);
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:'Jost',system-ui,sans-serif;background:var(--cream);color:#2b231b;font-size:15px}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--olive)}

.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:64px 1fr 48px;
  grid-template-areas:"topbar topbar" "sidebar main" "sidebar footer";min-height:100vh;transition:grid-template-columns .25s ease}
.app.collapsed{grid-template-columns:72px 1fr}

.topbar{grid-area:topbar;background:linear-gradient(180deg,#352922 0%,#2d2218 100%);border-bottom:1px solid rgba(212,168,90,.22);color:var(--cream);display:flex;align-items:center;padding:0 18px;box-shadow:var(--shadow-md);position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;width:260px;height:100%;transition:width .25s ease;border-right:1px solid var(--line)}
.app.collapsed .brand{width:72px}
.brand .bean-tile{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3d2f27,#1f1610);border:1px solid rgba(212,168,90,.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 6px 14px rgba(0,0,0,.35)}.brand .bean{font-size:1.35rem;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
.brand .brand-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:1.35rem;color:#efe2c9}
.brand .brand-text b{font-style:normal;font-family:'Jost',sans-serif;font-weight:700;letter-spacing:.34em;text-transform:uppercase;font-size:.95rem;margin-left:4px;background:linear-gradient(135deg,#f6e3b8 0%,#d4a85a 60%,#a8804a 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.app.collapsed .brand .brand-text{display:none}
.topbar-toggle{background:transparent;border:0;color:var(--cream);width:42px;height:42px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:14px;transition:all .2s}
.topbar-toggle:hover{background:rgba(255,255,255,.08);color:var(--caramel)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--cream);display:inline-flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none}
.icon-btn:hover{background:var(--caramel);color:var(--coffee);transform:translateY(-1px)}
.dropdown-menu{border:0;box-shadow:var(--shadow-lg);border-radius:12px;padding:6px}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-weight:500}
.dropdown-item:hover{background:var(--cream-2);color:var(--coffee)}

.sidebar{grid-area:sidebar;background:linear-gradient(180deg,#2d2218 0%,#241a12 100%);color:var(--cream);width:260px;transition:width .25s ease;border-right:1px solid var(--line);padding:18px 0;overflow:hidden}
.app.collapsed .sidebar{width:72px}
.side-divider{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);padding:14px 24px 6px;display:flex;align-items:center}
.app.collapsed .side-divider{justify-content:center;padding:14px 0 6px;font-size:.55rem;letter-spacing:.1em}
.side-divider::after{content:"";flex:1;height:1px;background:var(--line);margin-left:10px}
.app.collapsed .side-divider::after{display:none}
.side-nav{list-style:none;padding:0;margin:0}
.side-nav a{display:flex;align-items:center;gap:14px;padding:11px 24px;color:var(--cream);text-decoration:none;border-left:3px solid transparent;transition:all .2s;font-weight:500}
.side-nav a i{font-size:1.15rem;width:24px;text-align:center;color:var(--caramel)}
.side-nav a:hover{background:rgba(255,255,255,.04)}
.side-nav a.active{background:linear-gradient(90deg,rgba(200,163,122,.18),transparent);border-left-color:var(--caramel);color:#fff}
.app.collapsed .side-nav a{justify-content:center;padding:13px 0}
.app.collapsed .side-nav a span{display:none}

.footer{grid-area:footer;background:linear-gradient(180deg,#2d2218 0%,#241a12 100%);border-top:1px solid rgba(212,168,90,.22);border-left:1px solid rgba(212,168,90,.18);color:var(--muted);display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:.85rem;border-top:1px solid var(--line)}
.footer a{color:var(--caramel);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.footer a:hover{color:#fff}

.main{grid-area:main;padding:28px 32px;background:var(--cream);overflow:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.page-title{margin:0;font-size:2rem;line-height:1.1}
.page-title small{display:block;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--caramel-dk);font-weight:600;margin-bottom:6px}
.crumbs{font-size:.8rem;color:#8a7860;margin-top:4px}
.crumbs a{color:var(--caramel-dk);text-decoration:none}

.btn-fancy{border:0;color:#fff;font-weight:600;padding:10px 20px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;letter-spacing:.04em;box-shadow:var(--shadow-md);transition:transform .18s,box-shadow .18s,filter .18s}
.btn-fancy:hover{transform:translateY(-2px) scale(1.03);box-shadow:var(--shadow-lg);color:#fff;filter:brightness(1.06)}
.btn-fancy:active{transform:translateY(0) scale(.98);filter:brightness(.95)}
.btn-add{background:var(--grad-add)}
.btn-edit{background:var(--grad-edit);padding:7px 14px;border-radius:10px;font-size:.85rem}
.btn-delete{background:var(--grad-delete);padding:7px 14px;border-radius:10px;font-size:.85rem}

.card-soft{background:#fff;border:1px solid #ece3d4;border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;gap:12px;flex-wrap:wrap;border-bottom:1px solid #f0e8d9;background:#fdfaf3}
.form-control,.form-select{border-radius:10px;border:1px solid #e3d8c2;background:#fff;font-family:inherit;font-size:.9rem}
.form-control:focus,.form-select:focus{border-color:var(--caramel);box-shadow:0 0 0 .2rem rgba(200,163,122,.25)}
.input-icon{position:relative}
.input-icon i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#a8966f}
.input-icon .form-control{padding-left:36px;min-width:260px}
.toolbar-left{display:flex;align-items:center;gap:10px;color:#6f5d44;font-size:.85rem}
.toolbar-left .form-select{width:80px}

.table{margin:0;color:#2b231b}
.table thead th{background:#fdfaf3;color:var(--coffee);font-weight:600;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid #ece3d4;white-space:nowrap;cursor:pointer;user-select:none}
.table thead th .sort{margin-left:6px;opacity:.45;font-size:.75rem}
.table thead th.sorted .sort{opacity:1;color:var(--caramel-dk)}
.table tbody td{vertical-align:middle;border-color:#f4ecdd;padding:14px 12px}
.table tbody tr:hover{background:#fbf6ec}
.thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow-sm);background:#eee}
.badge-cat{background:var(--cream-2);color:var(--coffee);font-weight:500;letter-spacing:.05em;padding:5px 10px;border-radius:999px;font-size:.72rem;text-transform:uppercase}
.badge-featured{background:var(--grad-delete);color:#fff;padding:5px 10px;border-radius:999px;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid #f0e8d9;background:#fdfaf3;font-size:.85rem;color:#6f5d44;flex-wrap:wrap;gap:10px}
.pagination{margin:0;gap:4px}
.page-link{border:1px solid #e3d8c2;color:var(--coffee);border-radius:8px!important;margin:0 2px;min-width:36px;text-align:center;font-weight:500}
.page-item.active .page-link{background:var(--grad-add);border-color:transparent;color:#fff}
.row-actions{display:flex;gap:8px;justify-content:flex-end}

@media (max-width:768px){.app{grid-template-columns:1fr!important}.main{padding:18px}}
</style>
</head>
<body>

<div class="app" id="app">

  <header class="topbar">
    <div class="brand">
      <span class="bean-tile"><span class="bean">☕</span></span>
      <span class="brand-text"><i>the</i><b>cafert</b></span>
    </div>
    <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list" style="font-size:1.4rem"></i></button>
    <div class="topbar-actions">
      <a href="/" target="_blank" class="icon-btn" title="Open site"><i class="bi bi-box-arrow-up-right"></i></a>
      <a href="#" class="icon-btn" title="Account"><i class="bi bi-person"></i></a>
    </div>
  </header>

  <aside class="sidebar">
    <div class="side-divider">Overview</div>
    <ul class="side-nav">
      <li><a href="#"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
    </ul>
    <div class="side-divider">Content</div>
    <ul class="side-nav">
      <li><a href="#" class="active"><i class="bi bi-journal-richtext"></i><span>Menu</span></a></li>
      <li><a href="#"><i class="bi bi-people"></i><span>Team</span></a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title"><small>Content</small>Menu Items</h1>
        <div class="crumbs"><a href="#">Dashboard</a> / Menu</div>
      </div>
      <a href="create.html" class="btn-fancy btn-add">
        <i class="bi bi-plus-lg"></i> Add New Item
      </a>
    </div>

    <div class="card-soft">

      <!-- Toolbar: page-size + search -->
      <div class="table-toolbar">
        <div class="toolbar-left">
          <span>Show</span>
          <select class="form-select form-select-sm" id="pageSize">
            <option>5</option><option selected>10</option><option>15</option><option>20</option>
          </select>
          <span>entries</span>
        </div>
        <div class="input-icon">
          <i class="bi bi-search"></i>
          <input id="search" type="search" class="form-control form-control-sm" placeholder="Search menu items...">
        </div>
      </div>

      <div class="table-responsive">
        <table class="table align-middle" id="dataTable">
          <thead>
            <tr>
              <th data-sort="id">ID <i class="bi bi-arrow-down-up sort"></i></th>
              <th>Image</th>
              <th data-sort="name" class="sorted">Name <i class="bi bi-arrow-up sort"></i></th>
              <th data-sort="category">Category <i class="bi bi-arrow-down-up sort"></i></th>
              <th data-sort="price">Price <i class="bi bi-arrow-down-up sort"></i></th>
              <th data-sort="featured">Featured <i class="bi bi-arrow-down-up sort"></i></th>
              <th data-sort="sort">Order <i class="bi bi-arrow-down-up sort"></i></th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>

      <div class="table-footer">
        <div id="info">Showing 1 to 10 of 24 results</div>
        <nav>
          <ul class="pagination pagination-sm" id="pager">
            <li class="page-item disabled"><a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a></li>
          </ul>
        </nav>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div><span id="year"></span> &copy;
      <a href="https://github.com/zaruyashar" target="_blank"><i class="bi bi-github"></i> zaruyashar</a>
    </div>
    <div>Project #1 of SoftITo Backend Development Program</div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  document.getElementById('sidebarToggle').addEventListener('click', () =>
    document.getElementById('app').classList.toggle('collapsed'));

  // ----- Mock data (replace with server-rendered rows in MVC) -----
  const items = [
    {id:1, name:"Avocado Toast",     category:"Breakfasts", price:8.50, featured:true,  sort:1, img:"https://images.unsplash.com/photo-1525351484163-7529414344d8?w=120"},
    {id:2, name:"Cappuccino",        category:"Drinks",     price:4.20, featured:false, sort:2, img:"https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=120"},
    {id:3, name:"Tiramisu",          category:"Desserts",   price:6.90, featured:true,  sort:3, img:"https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=120"},
    {id:4, name:"Caesar Salad",      category:"Mains",      price:11.0, featured:false, sort:4, img:"https://images.unsplash.com/photo-1546793665-c74683f339c1?w=120"},
    {id:5, name:"Almond Croissant",  category:"Snacks",     price:3.80, featured:false, sort:5, img:"https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=120"},
    {id:6, name:"Iced Latte",        category:"Drinks",     price:4.50, featured:false, sort:6, img:"https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=120"},
    {id:7, name:"Pancake Stack",     category:"Breakfasts", price:9.20, featured:true,  sort:7, img:"https://images.unsplash.com/photo-1528207776546-365bb710ee93?w=120"},
    {id:8, name:"Mushroom Risotto",  category:"Mains",      price:13.5, featured:false, sort:8, img:"https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=120"},
  ];

  const tbody = document.getElementById('tbody');
  function render(rows){
    tbody.innerHTML = rows.map(i => `
      <tr>
        <td class="text-muted">#${String(i.id).padStart(3,'0')}</td>
        <td><img class="thumb" src="${i.img}" alt=""></td>
        <td><strong>${i.name}</strong></td>
        <td><span class="badge-cat">${i.category}</span></td>
        <td>$${i.price.toFixed(2)}</td>
        <td>${i.featured ? '<span class="badge-featured">Sale</span>' : '<span class="text-muted">—</span>'}</td>
        <td>${i.sort}</td>
        <td>
          <div class="row-actions">
            <a href="update.html?id=${i.id}" class="btn-fancy btn-edit"><i class="bi bi-pencil-fill"></i> Edit</a>
            <button class="btn-fancy btn-delete" data-id="${i.id}" data-name="${i.name}"><i class="bi bi-trash3-fill"></i> Delete</button>
          </div>
        </td>
      </tr>`).join('');
  }
  render(items);

  // Search filter
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    render(items.filter(i => (i.name + i.category).toLowerCase().includes(q)));
  });

  // Sort
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      document.querySelectorAll('th[data-sort]').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      const key = th.dataset.sort, asc = !th.dataset.asc;
      th.dataset.asc = asc ? '1' : '';
      const k = {id:'id',name:'name',category:'category',price:'price',featured:'featured',sort:'sort'}[key];
      items.sort((a,b)=> (a[k]>b[k]?1:-1) * (asc?1:-1));
      render(items);
    });
  });

  // SweetAlert delete
  tbody.addEventListener('click', e => {
    const btn = e.target.closest('.btn-delete'); if(!btn) return;
    Swal.fire({
      title:'Delete this item?',
      text:`"${btn.dataset.name}" will be permanently removed.`,
      icon:'warning', showCancelButton:true,
      confirmButtonText:'Yes, delete',
      cancelButtonText:'Cancel',
      confirmButtonColor:'#c8553d',
      cancelButtonColor:'#5b4636',
      background:'#fbf8f3',
    }).then(r => {
      if(r.isConfirmed){
        // POST to /Menu/Delete/{id}
        Swal.fire({title:'Deleted', icon:'success', background:'#fbf8f3', confirmButtonColor:'#5b4636'});
      }
    });
  });
</script>
</body>
</html>
